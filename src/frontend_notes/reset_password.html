<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-theme-toggle">
        <button id="theme-toggle-btn">
            🌙 Dark Mode
        </button>
    </div>
    <div class="auth-card">
        <div class="auth-logo">N</div>
        <h1 class="auth-title">
            Đặt lại mật khẩu
        </h1>
        <p class="auth-subtitle">
            Khôi phục tài khoản bằng OTP
            hoặc email xác minh
        </p>
        <form id="request-section" class="auth-form">
            <div class="input-group">
                <input type="email" id="request-email" class="auth-input" placeholder="Email của bạn">
            </div>
            <div id="message"></div>
            <div class="auth-links">
                <a href="index.html" onclick="goBack(); return false;"> Quay lại đăng nhập </a>
            </div>
            <button type="button" class="auth-btn" onclick="handleRequestReset(event)">Gửi link / OTP đến email</button>
        </form>
        <form id="reset-section"
            class="auth-form"
            style="display:none;">

            <div class="input-group">
                <input
                    type="email"
                    id="reset-email"
                    class="auth-input"
                    placeholder="Email của bạn">
            </div>

            <div class="input-group" id="otp-group">
                <input
                    type="text"
                    id="reset-otp"
                    class="auth-input"
                    placeholder="Mã OTP từ email">
            </div>

            <div class="input-group">
                <input
                    type="password"
                    id="reset-password"
                    class="auth-input"
                    placeholder="Mật khẩu mới">
            </div>

            <div class="input-group">
                <input
                    type="password"
                    id="reset-confirm-password"
                    class="auth-input"
                    placeholder="Xác nhận mật khẩu mới">
            </div>

            <button
                type="button"
                class="auth-btn"
                onclick="handleResetPassword(event)">
                Đặt lại mật khẩu
            </button>

        </form>
    </div>
    <script>
        const apiBase = `${window.location.origin}/api/auth`;
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get('token');
        window.resetToken = '';
        if (tokenFromUrl) {
            document.getElementById('request-section').style.display = 'none';
            document.getElementById('reset-section').style.display = 'block';
            window.resetToken = tokenFromUrl;
            document.getElementById('otp-group').style.display = 'none';
            document.getElementById('reset-email').focus();
        }

        function showMessage(text, type = 'black') {
            const messageEl = document.getElementById('message');
            messageEl.style.color = type;
            messageEl.textContent = text;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function handleRequestReset(event) {
            if(event) event.preventDefault();
            const email = document.getElementById('request-email').value.trim();
            if (!email) {
                showMessage('Vui lòng nhập email.', 'red');
                return;
            }
            showMessage('Đang gửi yêu cầu...', 'blue');

            try {
                const response = await fetch(`${apiBase}/request-password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'green');
                    // Ẩn form gửi email
                    document.getElementById('request-section').style.display = 'none';
                    // Hiện form reset
                    document.getElementById('reset-section').style.display = 'block';
                    // Fill email
                    document.getElementById('reset-email').value = email;
                } else {
                    showMessage(data.message || 'Có lỗi xảy ra.', 'red');
                }
            } catch (error) {
                showMessage('Không thể kết nối đến máy chủ.', 'red');
            }
        }

        async function handleResetPassword(event) {
            if(event) event.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            const token = window.resetToken || '';
            const otp = document.getElementById('reset-otp').value.trim();
            const password = document.getElementById('reset-password').value.trim();
            const confirmPassword = document.getElementById('reset-confirm-password').value.trim();

            if (!password || !confirmPassword) {
                showMessage('Vui lòng nhập mật khẩu và xác nhận.', 'red');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('Mật khẩu và xác nhận không khớp.', 'red');
                return;
            }
            if (!token && (!email || !otp)) {
                showMessage('Vui lòng nhập email và mã OTP hoặc dùng token từ email.', 'red');
                return;
            }

            const payload = { password };
            if (token) {
                payload.token = token;
            } else {
                payload.email = email;
                payload.otp = otp;
            }

            showMessage('Đang đặt lại mật khẩu...', 'blue');
            try {
                const response = await fetch(`${apiBase}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'green');
                    setTimeout(() => goBack(), 2000);
                } else {
                    showMessage(data.message || 'Có lỗi xảy ra.', 'red');
                }
            } catch (error) {
                showMessage('Không thể kết nối đến máy chủ.', 'red');
            }
        }
    </script>
    <script>
    const themeBtn =
        document.getElementById(
            'theme-toggle-btn'
        );
    const savedTheme =
        localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.body.classList.add(
            'dark-mode'
        );
        themeBtn.innerHTML =
            '☀️ Light Mode';
    }
    themeBtn.addEventListener(
        'click',
        () => {
            document.body.classList.toggle(
                'dark-mode'
            );
            const isDark =
                document.body.classList.contains(
                    'dark-mode'
                );
            localStorage.setItem(
                'theme',
                isDark ? 'dark' : 'light'
            );
            themeBtn.innerHTML =
                isDark
                    ? '☀️ Light Mode'
                    : '🌙 Dark Mode';
        }
    );
</script>
</body>
</html>
