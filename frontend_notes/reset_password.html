<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .box { width: 360px; background: white; padding: 28px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { margin-top: 0; color: #1c1e21; text-align: center; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        .input-group input { width: 100%; padding: 11px 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #0866ff; color: white; font-size: 15px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0056e0; }
        .info { margin-bottom: 16px; font-size: 14px; color: #555; line-height: 1.5; }
        .link { text-align: center; margin-top: 14px; font-size: 14px; color: #0866ff; cursor: pointer; }
        .link:hover { text-decoration: underline; }
        #message { text-align: center; min-height: 24px; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đặt lại mật khẩu</h2>
        <p class="info">Bạn có thể yêu cầu gửi mã OTP/link qua email. Sau đó nhập mã OTP hoặc dùng link token để thay mật khẩu mới.</p>

        <div id="request-section">
            <div class="input-group">
                <label for="request-email">Email của bạn</label>
                <input type="email" id="request-email" placeholder="email@example.com">
            </div>
            <button class="btn" onclick="handleRequestReset()">Gửi link / OTP đến email</button>
        </div>

        <div id="reset-section" style="display:none; margin-top: 18px;">
            <div class="input-group">
                <label for="reset-email">Email</label>
                <input type="email" id="reset-email" placeholder="email@example.com">
            </div>
            <div class="input-group">
                <label for="reset-token">Token (nếu có)</label>
                <input type="text" id="reset-token" placeholder="Token từ email" readonly>
            </div>
            <div class="input-group">
                <label for="reset-otp">Mã OTP</label>
                <input type="text" id="reset-otp" placeholder="Mã OTP từ email">
            </div>
            <div class="input-group">
                <label for="reset-password">Mật khẩu mới</label>
                <input type="password" id="reset-password" placeholder="Mật khẩu mới">
            </div>
            <div class="input-group">
                <label for="reset-confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="reset-confirm-password" placeholder="Xác nhận mật khẩu mới">
            </div>
            <button class="btn" onclick="handleResetPassword()">Đặt lại mật khẩu</button>
        </div>

        <div id="message"></div>
        <div class="link" onclick="goBack()">Quay lại đăng nhập</div>
    </div>

    <script>
        const apiBase = `${window.location.origin}/api/auth`;
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get('token');

        if (tokenFromUrl) {
            document.getElementById('request-section').style.display = 'none';
            document.getElementById('reset-section').style.display = 'block';
            document.getElementById('reset-token').value = tokenFromUrl;
            document.getElementById('reset-email').focus();
        }

        function showMessage(text, type = 'black') {
            const messageEl = document.getElementById('message');
            messageEl.style.color = type;
            messageEl.textContent = text;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function handleRequestReset() {
            const email = document.getElementById('request-email').value.trim();
            if (!email) {
                showMessage('Vui lòng nhập email.', 'red');
                return;
            }
            showMessage('Đang gửi yêu cầu...', 'blue');

            try {
                const response = await fetch(`${apiBase}/request-password-reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'green');
                    document.getElementById('reset-section').style.display = 'block';
                    document.getElementById('reset-email').value = email;
                } else {
                    showMessage(data.message || 'Có lỗi xảy ra.', 'red');
                }
            } catch (error) {
                showMessage('Không thể kết nối đến máy chủ.', 'red');
            }
        }

        async function handleResetPassword() {
            const email = document.getElementById('reset-email').value.trim();
            const token = document.getElementById('reset-token').value.trim();
            const otp = document.getElementById('reset-otp').value.trim();
            const password = document.getElementById('reset-password').value.trim();
            const confirmPassword = document.getElementById('reset-confirm-password').value.trim();

            if (!password || !confirmPassword) {
                showMessage('Vui lòng nhập mật khẩu và xác nhận.', 'red');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('Mật khẩu và xác nhận không khớp.', 'red');
                return;
            }
            if (!token && (!email || !otp)) {
                showMessage('Vui lòng nhập email và mã OTP hoặc dùng token từ email.', 'red');
                return;
            }

            const payload = { password };
            if (token) {
                payload.token = token;
            } else {
                payload.email = email;
                payload.otp = otp;
            }

            showMessage('Đang đặt lại mật khẩu...', 'blue');
            try {
                const response = await fetch(`${apiBase}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'green');
                    setTimeout(() => goBack(), 2000);
                } else {
                    showMessage(data.message || 'Có lỗi xảy ra.', 'red');
                }
            } catch (error) {
                showMessage('Không thể kết nối đến máy chủ.', 'red');
            }
        }
    </script>
</body>
</html>
