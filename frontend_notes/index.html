<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/auth.css">
    <title>Hệ thống Ghi chú - Xác thực</title>
</head>
<body class="auth-page">
    <!-- THEME BUTTON -->
    <div class="auth-theme-toggle">
        <button id="themeToggle" class="view-btn">
            🌙 Dark Mode
        </button>
    </div>
    <div class="auth-card">
        <div class="auth-logo">
            N
        </div>
        <h1 class="auth-title">
            Smart Notes
        </h1>
        <p class="auth-subtitle">
            Modern note management system
        </p>
        <div class="auth-form">
            <input
                type="email"
                id="email"
                placeholder="Email của bạn"
                required
            >
            <input
                type="password"
                id="password"
                placeholder="Mật khẩu"
                required
            >
            <button
                class="auth-btn"
                id="submit-btn"
                onclick="handleSubmit()"
            >
                Đăng nhập
            </button>
        </div>
        <div class="auth-links">
            <a href="reset_password.html" id="forgot-password-link">
                Quên mật khẩu? Đặt lại qua email/OTP
            </a>
            <div class="auth-tabs">
                <button
                    class="auth-tab active"
                    id="login-tab"
                    onclick="setAuthMode(true)"
                >
                    Đăng nhập
                </button>
                <button
                    class="auth-tab"
                    id="register-tab"
                    onclick="setAuthMode(false)"
                >
                    Đăng ký
                </button>
            </div>
        </div>
        <div id="message"></div>
    </div>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'home.html';
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker
                .register('sw.js')
                .catch(() => {});
        }
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme =
            localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML =
                '☀️ Light Mode';

        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark =
                document.body.classList.contains('dark-mode');
            localStorage.setItem(
                'theme',
                isDark ? 'dark' : 'light'
            );
            themeToggle.innerHTML =
                isDark
                    ? '☀️ Light Mode'
                    : '🌙 Dark Mode';
        });

        // =========================
        // LOGIN / REGISTER
        // =========================

        let isLoginMode = true;
        function setAuthMode(isLogin) {
            isLoginMode = isLogin;
            const title =
                document.querySelector('.auth-title');
            const btn =
                document.getElementById('submit-btn');
            const loginTab =
                document.getElementById('login-tab');
            const registerTab =
                document.getElementById('register-tab');
            const forgotPasswordLink =
                document.getElementById('forgot-password-link');
            if (isLoginMode) {
                title.innerText =
                    'Smart Notes';
                btn.innerText =
                    'Đăng nhập';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                forgotPasswordLink.style.display = 'block';
            } else {
                title.innerText =
                    'Create Account';
                btn.innerText =
                    'Đăng ký ngay';
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                forgotPasswordLink.style.display = 'none';
            }
        }
        async function handleSubmit() {
            const email =
                document
                    .getElementById('email')
                    .value
                    .trim();
            const password =
                document
                    .getElementById('password')
                    .value
                    .trim();
            const messageEl =
                document.getElementById('message');
            if (!email || !password) {

                messageEl.style.color = '#ef4444';

                messageEl.innerText =
                    'Vui lòng nhập đủ email và mật khẩu!';
                return;
            }
            messageEl.style.color = '#2563eb';
            messageEl.innerText =
                'Đang xử lý...';
            const endpoint =
                isLoginMode
                    ? '/api/auth/login'
                    : '/api/auth/register';
            try {
                const response = await fetch(
                    `${window.location.origin}${endpoint}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type':
                                'application/json'
                        },
                        body: JSON.stringify({
                            email,
                            password
                        })
                    }
                );
                const data =
                    await response.json();
                if (response.ok) {
                    messageEl.style.color =
                        '#22c55e';
                    messageEl.innerText =
                        `✓ ${data.message}`;
                    if (isLoginMode) {
                        localStorage.setItem(
                            'token',
                            data.token
                        );
                        localStorage.setItem(
                            'displayName',
                            data.displayName
                        );
                        setTimeout(() => {
                            window.location.href =
                                'home.html';
                        }, 900);
                    } else {
                        messageEl.innerText =
                            'Đăng ký thành công! Kiểm tra email để kích hoạt tài khoản.';
                        setTimeout(() => {
                            toggleForm();
                            document
                                .getElementById('password')
                                .value = '';
                        }, 1800);
                    }
                } else {
                    messageEl.style.color =
                        '#ef4444';
                    messageEl.innerText =
                        data.message;
                }
            } catch (error) {
                messageEl.style.color =
                    '#ef4444';
                messageEl.innerText =
                    'Không thể kết nối đến máy chủ!';
            }
        }
    </script>
</body>
</html>
